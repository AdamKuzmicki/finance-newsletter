<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Daily Finance Brief</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #f5f5f0;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header {
      background: #1a1a2e;
      color: #ffffff;
      padding: 28px 36px;
      border-bottom: 3px solid #e8b84b;
    }
    .header h1 {
      margin: 0 0 4px 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .header p {
      margin: 0;
      color: #aab3c8;
      font-size: 13px;
    }
    .body {
      padding: 28px 36px;
      line-height: 1.75;
      font-size: 15px;
    }
    h2 {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      border-bottom: 1.5px solid #e8e8e0;
      padding-bottom: 6px;
      margin-top: 32px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    h3 {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-top: 20px;
      margin-bottom: 6px;
    }
    p { margin: 0 0 14px 0; }
    ul { padding-left: 20px; }
    li { margin-bottom: 6px; }
    .footer {
      background: #f5f5f0;
      padding: 16px 36px;
      text-align: center;
      font-size: 12px;
      color: #999;
      border-top: 1px solid #e0e0d8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Finance Intelligence Brief</h1>
      <p>Your personalized daily market & learning digest</p>
    </div>
    <div class="body">
      {{ newsletter_content }}
    </div>
    <div class="footer">
      Delivered by your personal Finance AI Agent &bull; Built with Claude API
    </div>
  </div>
</body>
</html>
